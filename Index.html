<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giveaway Anmeldung</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9fa8da 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        h2 { color: #333; margin-top: 0; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        label { display: block; text-align: left; font-weight: bold; color: #444; margin-bottom: 5px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: #0088cc; outline: none; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #006699; }
        #status { margin-top: 20px; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Giveaway 🎉</h2>
    <p>Trage deinen Namen ein, um im Lostopf zu landen!</p>
    
    <form id="giveawayForm">
        <label Brief for="name">Dein Name:</label>
        <input type="text" id="name" name="name" placeholder="z.B. Max Mustermann" required>
        <button type="submit">Jetzt anmelden</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    // --- HIER DEINE RENDER-SERVER-URL EINTRAGEN ---
    const SERVER_URL = 'https://dein-giveaway-bot.onrender.com'; 
    // ----------------------------------------------

    document.getElementById('giveawayForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const nameInput = document.getElementById('name');
        const statusDiv = document.getElementById('status');
        
        statusDiv.innerText = "Sende Daten...";
        statusDiv.style.color = "#ffa500";

        try {
            const response = await fetch(`${SERVER_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: nameInput.value })
            });

            if (response.ok) {
                statusDiv.innerText = "Erfolgreich angemeldet! 🏆";
                statusDiv.style.color = "#2ecc71";
                nameInput.value = ""; 
            } else {
                statusDiv.innerText = "Fehler bei der Anmeldung. Bitte nochmal versuchen.";
                statusDiv.style.color = "#e74c3c";
            }
        } catch (error) {
            statusDiv.innerText = "Server aktuell nicht erreichbar.";
            statusDiv.style.color = "#e74c3c";
        }
    });
</script>

</body>
</html>
